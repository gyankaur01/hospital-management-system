<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Appointments</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="uil uil-medkit"></i>
                <h2>HMS Pro</h2>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="uil uil-estate"></i> Dashboard
                </a>
                <a href="patients.html" class="menu-item">
                    <i class="uil uil-users-alt"></i> Patients
                </a>
                <a href="appointments.html" class="menu-item active">
                    <i class="uil uil-calendar-alt"></i> Appointments
                </a>
                <a href="pharmacy.html" class="menu-item">
                    <i class="uil uil-capsule"></i> Pharmacy
                </a>
                <a href="billing.html" class="menu-item">
                    <i class="uil uil-invoice"></i> Billing
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="menu-item text-danger">
                    <i class="uil uil-signout"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="flex-between" style="gap: 1.5rem;">
                    <button id="sidebar-toggle" class="btn-outline">
                        <i class="uil uil-bars"></i>
                    </button>
                    <h1 class="page-title">Appointments Management</h1>
                </div>
                <div class="user-info">
                    <div class="user-details" style="text-align: right;">
                        <div id="current-user-name" class="fw-600" style="font-size: 0.95rem;">Loading...</div>
                        <div class="fs-small text-secondary">Manage System</div>
                    </div>
                    <div class="user-avatar">
                        <i class="uil uil-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-wrapper animate-fade-in">
                <div class="data-card">
                    <div class="card-header">
                        <h3>Appointments Schedule</h3>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline" onclick="window.HMS.exportToCSV('appointments', 'Appointments_Schedule')">
                                <i class="uil uil-file-export"></i> Export CSV
                            </button>
                            <button class="btn btn-primary" onclick="HMS.openModal('appointment-modal')">
                                <i class="uil uil-plus"></i> Schedule Appointment
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Patient</th>
                                    <th>Doctor</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="appointments-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer flex-between mt-20">
                        <p id="pagination-info" class="fs-small text-secondary">Showing 1-5 of 0</p>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline p-10 fs-small" id="prev-page">Prev</button>
                            <button class="btn btn-outline p-10 fs-small" id="next-page">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Appointment Modal -->
    <div class="modal-overlay" id="appointment-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="appointment-modal-title">Schedule Appointment</h3>
                <button class="close-btn" onclick="HMS.closeModal('appointment-modal')">&times;</button>
            </div>
            <form id="appointment-form">
                <input type="hidden" id="appointment-id">
                <div class="form-group">
                    <label for="app-patient">Patient</label>
                    <select id="app-patient" class="form-control" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="app-doctor">Assigned Doctor</label>
                    <select id="app-doctor" class="form-control" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="app-date">Date</label>
                        <input type="date" id="app-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="app-time">Time</label>
                        <input type="time" id="app-time" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="app-status">Status</label>
                    <select id="app-status" class="form-control" required>
                        <option value="Active">Active</option>
                        <option value="Pending">Pending</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="flex-gap-1 mt-20">
                    <button type="button" class="btn btn-outline" onclick="HMS.closeModal('appointment-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Appointment</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.HMS) {
                const renderAppList = (data) => {
                    const tbody = document.getElementById('appointments-tbody');
                    tbody.innerHTML = data.map(a => `
                        <tr>
                            <td><strong>#${a.id}</strong></td>
                            <td>${a.patientName}</td>
                            <td>${a.doctorName}</td>
                            <td>${a.date}</td>
                            <td>${a.time}</td>
                            <td><span class="badge ${a.status === 'Active' ? 'success' : 'warning'}">${a.status}</span></td>
                            <td>
                                <button class="btn p-5 text-danger action-btn" data-action="delete" data-id="${a.id}"><i class="uil uil-trash"></i></button>
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="7">No appointments found.</td></tr>';
                };

                const appointments = HMS.getData('appointments');
                HMS.initPagination(appointments, 'appointments-tbody', 'pagination-info', 'prev-page', 'next-page', renderAppList);
                HMS.populatePatientSelects();

                // Event delegation for delete
                document.getElementById('appointments-tbody').addEventListener('click', (e) => {
                    const btn = e.target.closest('.action-btn');
                    if (!btn) return;
                    const id = Number(btn.dataset.id);
                    if (btn.dataset.action === 'delete') HMS.deleteAppointment(id);
                });

                document.getElementById('appointment-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const rawId = document.getElementById('appointment-id').value;
                    const id = rawId ? Number(rawId) : null;
                    const data = {
                        patientName: document.getElementById('app-patient').value,
                        doctorName: document.getElementById('app-doctor').value,
                        date: document.getElementById('app-date').value,
                        time: document.getElementById('app-time').value,
                        status: document.getElementById('app-status').value
                    };
                    HMS.saveAppointment(id, data);
                    setTimeout(() => location.reload(), 800);
                });
            }
        });
    </script>
</body>
</html>
