<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Doctors</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="uil uil-medkit"></i>
                <h2>HMS Pro</h2>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="uil uil-estate"></i> Dashboard
                </a>
                <a href="doctors.html" class="menu-item active">
                    <i class="uil uil-user-md"></i> Doctors
                </a>
                <a href="patients.html" class="menu-item">
                    <i class="uil uil-users-alt"></i> Patients
                </a>
                <a href="appointments.html" class="menu-item">
                    <i class="uil uil-calendar-alt"></i> Appointments
                </a>
                <a href="pharmacy.html" class="menu-item">
                    <i class="uil uil-capsule"></i> Pharmacy
                </a>
                <a href="billing.html" class="menu-item">
                    <i class="uil uil-invoice"></i> Billing
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="menu-item text-danger">
                    <i class="uil uil-signout"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="flex-between" style="gap: 1.5rem;">
                    <button id="sidebar-toggle" class="btn-outline">
                        <i class="uil uil-bars"></i>
                    </button>
                    <h1 class="page-title">Doctors Management</h1>
                </div>
                <div class="user-info">
                    <div class="user-details" style="text-align: right;">
                        <div id="current-user-name" class="fw-600" style="font-size: 0.95rem;">Loading...</div>
                        <div class="fs-small text-secondary">Manage System</div>
                    </div>
                    <div class="user-avatar">
                        <i class="uil uil-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-wrapper animate-fade-in">
                <div class="data-card">
                    <div class="card-header">
                        <h3>Doctors List</h3>
                        <button class="btn btn-primary" onclick="HMS.openModal('doctor-modal')">
                            <i class="uil uil-plus"></i> Add New Doctor
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Specialization</th>
                                    <th>Contact</th>
                                    <th>Timings</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctors-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Doctor Modal -->
    <div class="modal-overlay" id="doctor-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="doctor-modal-title">Add New Doctor</h3>
                <button class="close-btn" onclick="HMS.closeModal('doctor-modal')">&times;</button>
            </div>
            <form id="doctor-form">
                <input type="hidden" id="doctor-id">
                <div class="form-group">
                    <label for="doctor-name">Doctor Name</label>
                    <input type="text" id="doctor-name" class="form-control" placeholder="E.g. Dr. John Doe" required>
                </div>
                <div class="form-group">
                    <label for="doctor-spec">Specialization</label>
                    <input type="text" id="doctor-spec" class="form-control" placeholder="E.g. Cardiologist" required>
                </div>
                <div class="form-group">
                    <label for="doctor-contact">Contact Number</label>
                    <input type="text" id="doctor-contact" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="doctor-timings">Timings</label>
                    <input type="text" id="doctor-timings" class="form-control" placeholder="E.g. 10:00 AM - 04:00 PM" required>
                </div>
                <div class="flex-gap-1 mt-20">
                    <button type="button" class="btn btn-outline" onclick="HMS.closeModal('doctor-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Doctor Profile</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.HMS) {
                window.HMS.renderDoctors();
            }
            
            // Connect form manually
            document.getElementById('doctor-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const id = document.getElementById('doctor-id').value;
                const name = document.getElementById('doctor-name').value;
                const spec = document.getElementById('doctor-spec').value;
                const contact = document.getElementById('doctor-contact').value;
                const timings = document.getElementById('doctor-timings').value;
                
                if(window.HMS) {
                    window.HMS.saveDoctor(id ? parseInt(id) : null, { name, spec, contact, timings });
                }
            });
        });
    </script>
</body>
</html>
