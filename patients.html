<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Patients</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="uil uil-medkit"></i>
                <h2>HMS Pro</h2>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="uil uil-estate"></i> Dashboard
                </a>
                <a href="patients.html" class="menu-item active">
                    <i class="uil uil-users-alt"></i> Patients
                </a>
                <a href="appointments.html" class="menu-item">
                    <i class="uil uil-calendar-alt"></i> Appointments
                </a>
                <a href="pharmacy.html" class="menu-item">
                    <i class="uil uil-capsule"></i> Pharmacy
                </a>
                <a href="billing.html" class="menu-item">
                    <i class="uil uil-invoice"></i> Billing
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="menu-item text-danger">
                    <i class="uil uil-signout"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="flex-between" style="gap: 1.5rem;">
                    <button id="sidebar-toggle" class="btn-outline">
                        <i class="uil uil-bars"></i>
                    </button>
                    <h1 class="page-title">Patients Management</h1>
                </div>
                <div class="user-info">
                    <div class="user-details" style="text-align: right;">
                        <div id="current-user-name" class="fw-600" style="font-size: 0.95rem;">Loading...</div>
                        <div class="fs-small text-secondary">Manage System</div>
                    </div>
                    <div class="user-avatar">
                        <i class="uil uil-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-wrapper animate-fade-in">
                <div class="data-card">
                    <div class="card-header">
                        <div class="flex-between" style="gap: 1rem; flex: 1;">
                            <h3>Patient List</h3>
                            <div class="search-container">
                                <i class="uil uil-search"></i>
                                <input type="text" id="patient-search" class="form-control" placeholder="Search patients...">
                            </div>
                        </div>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline" onclick="window.HMS.exportToCSV('patients', 'Patients_List')">
                                <i class="uil uil-file-export"></i> Export CSV
                            </button>
                            <button class="btn btn-primary" onclick="document.getElementById('patient-id').value=''; document.getElementById('patient-form').reset(); document.getElementById('patient-modal-title').textContent='Add New Patient'; HMS.openModal('patient-modal')">
                                <i class="uil uil-plus"></i> Add Patient
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Contact</th>
                                    <th>Age</th>
                                    <th>Gender</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="patients-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer flex-between mt-20">
                        <p id="pagination-info" class="fs-small text-secondary">Showing 1-5 of 0</p>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline p-10 fs-small" id="prev-page">Prev</button>
                            <button class="btn btn-outline p-10 fs-small" id="next-page">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Patient Modal -->
    <div class="modal-overlay" id="patient-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="patient-modal-title">Add New Patient</h3>
                <button class="close-btn" onclick="HMS.closeModal('patient-modal')">&times;</button>
            </div>
            <form id="patient-form">
                <input type="hidden" id="patient-id">
                <div class="form-group">
                    <label for="patient-name">Full Name</label>
                    <input type="text" id="patient-name" class="form-control" placeholder="E.g. John Doe" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="patient-age">Age</label>
                        <input type="number" id="patient-age" class="form-control" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="patient-gender">Gender</label>
                        <select id="patient-gender" class="form-control" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="patient-contact">Contact Number</label>
                    <input type="text" id="patient-contact" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="patient-history">Medical History</label>
                    <textarea id="patient-history" class="form-control" rows="3" placeholder="Any known allergies or conditions..."></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="HMS.closeModal('patient-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Patient</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.HMS) {
                const renderPatientsList = (data) => {
                    const tbody = document.getElementById('patients-tbody');
                    tbody.innerHTML = data.map(p => `
                        <tr>
                            <td><strong>#${p.id}</strong></td>
                            <td>${p.name}</td>
                            <td>${p.contact}</td>
                            <td>${p.age}</td>
                            <td>${p.gender}</td>
                            <td><span class="badge success">Active</span></td>
                            <td>
                                <button class="btn p-5 action-btn" data-action="edit" data-id="${p.id}"><i class="uil uil-edit"></i></button>
                                <button class="btn p-5 text-danger action-btn" data-action="delete" data-id="${p.id}"><i class="uil uil-trash"></i></button>
                            </td>
                        </tr>
                    `).join('') || '<tr><td colspan="7">No patients found.</td></tr>';
                };

                const patients = HMS.getData('patients');
                HMS.initPagination(patients, 'patients-tbody', 'pagination-info', 'prev-page', 'next-page', renderPatientsList);
                HMS.searchTable('patient-search', 'patients-tbody');

                // Event delegation — works reliably after any re-render
                document.getElementById('patients-tbody').addEventListener('click', (e) => {
                    const btn = e.target.closest('.action-btn');
                    if (!btn) return;
                    const id = Number(btn.dataset.id);
                    const action = btn.dataset.action;
                    if (action === 'edit') HMS.editPatient(id);
                    if (action === 'delete') HMS.deletePatient(id);
                });
            }
        });

        document.getElementById('patient-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('patient-name').value,
                age: document.getElementById('patient-age').value,
                gender: document.getElementById('patient-gender').value,
                contact: document.getElementById('patient-contact').value,
                history: document.getElementById('patient-history').value
            };
            const rawId = document.getElementById('patient-id').value;
            const id = rawId ? Number(rawId) : null;

            let patients = HMS.getData('patients');
            if (id) {
                const idx = patients.findIndex(p => p.id === id);
                if (idx > -1) patients[idx] = { ...patients[idx], ...data };
            } else {
                const newId = Date.now();
                patients.push({ id: newId, ...data });
                let users = JSON.parse(localStorage.getItem('hms_users')) || [];
                users.push({ id: newId, role: 'Patient', username: data.contact, password: 'password' });
                localStorage.setItem('hms_users', JSON.stringify(users));
            }

            HMS.setData('patients', patients);
            HMS.showToast('Success', 'Patient record saved successfully.');
            HMS.closeModal('patient-modal');
            setTimeout(() => location.reload(), 800);
        });
    </script>
</body>
</html>
