<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS | Billing</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="uil uil-medkit"></i>
                <h2>HMS Pro</h2>
            </div>
            <div class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="uil uil-estate"></i> Dashboard
                </a>
                <a href="patients.html" class="menu-item">
                    <i class="uil uil-users-alt"></i> Patients
                </a>
                <a href="appointments.html" class="menu-item">
                    <i class="uil uil-calendar-alt"></i> Appointments
                </a>
                <a href="pharmacy.html" class="menu-item">
                    <i class="uil uil-capsule"></i> Pharmacy
                </a>
                <a href="billing.html" class="menu-item active">
                    <i class="uil uil-invoice"></i> Billing
                </a>
            </div>
            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="menu-item text-danger">
                    <i class="uil uil-signout"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="flex-between" style="gap: 1.5rem;">
                    <button id="sidebar-toggle" class="btn-outline">
                        <i class="uil uil-bars"></i>
                    </button>
                    <h1 class="page-title">Billing & Invoices</h1>
                </div>
                <div class="user-info">
                    <div class="user-details" style="text-align: right;">
                        <div id="current-user-name" class="fw-600" style="font-size: 0.95rem;">Loading...</div>
                        <div class="fs-small text-secondary">Manage System</div>
                    </div>
                    <div class="user-avatar">
                        <i class="uil uil-user"></i>
                    </div>
                </div>
            </header>

            <div class="content-wrapper animate-fade-in">
                <div class="data-card">
                    <div class="card-header">
                        <h3>Recent Invoices</h3>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline" onclick="window.HMS.exportToCSV('bills', 'Billing_Records')">
                                <i class="uil uil-file-export"></i> Export CSV
                            </button>
                            <button class="btn btn-primary" onclick="document.getElementById('bill-id').value=''; document.getElementById('bill-form').reset(); document.getElementById('bill-modal-title').textContent='Generate Invoice'; document.getElementById('bill-date').valueAsDate=new Date(); HMS.populateBillPatientSelects(); HMS.openModal('bill-modal')">
                                <i class="uil uil-plus"></i> Generate Bill
                            </button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table>
                            <thead>
                                <tr>
                                    <th>Invoice #</th>
                                    <th>Patient</th>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bills-tbody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                    <div class="card-footer flex-between mt-20">
                        <p id="pagination-info" class="fs-small text-secondary">Showing 1-5 of 0</p>
                        <div class="flex-gap-1" style="gap: 0.5rem;">
                            <button class="btn btn-outline p-10 fs-small" id="prev-page">Prev</button>
                            <button class="btn btn-outline p-10 fs-small" id="next-page">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Bill Modal -->
    <div class="modal-overlay" id="bill-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="bill-modal-title">Generate Invoice</h3>
                <button class="close-btn" onclick="HMS.closeModal('bill-modal')">&times;</button>
            </div>
            <form id="bill-form">
                <input type="hidden" id="bill-id">
                <div class="form-group">
                    <label for="bill-patient">Select Patient</label>
                    <select id="bill-patient" class="form-control" required>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="bill-date">Invoice Date</label>
                        <input type="date" id="bill-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="bill-amount">Total Amount (₹)</label>
                        <input type="number" id="bill-amount" class="form-control" required step="0.01" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label for="bill-status">Payment Status</label>
                    <select id="bill-status" class="form-control" required>
                        <option value="Unpaid">Unpaid</option>
                        <option value="Paid">Paid</option>
                    </select>
                </div>
                <div class="flex-gap-1 mt-20">
                    <button type="button" class="btn btn-outline" onclick="HMS.closeModal('bill-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Invoice</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.HMS) {
                const renderBillList = (data) => {
                    const tbody = document.getElementById('bills-tbody');
                    tbody.innerHTML = data.map(b => {
                        const badgeClass = b.status === 'Paid' ? 'success' : 'warning';
                        return `
                        <tr>
                            <td><strong>#${b.id}</strong></td>
                            <td>${b.patientName}</td>
                            <td>${b.date}</td>
                            <td>&#8377;${parseFloat(b.amount).toFixed(2)}</td>
                            <td><span class="badge ${badgeClass}">${b.status}</span></td>
                            <td>
                                <button class="btn p-5 action-btn" data-action="edit" data-id="${b.id}"><i class="uil uil-edit"></i></button>
                                <button class="btn p-5 text-danger action-btn" data-action="delete" data-id="${b.id}"><i class="uil uil-trash"></i></button>
                            </td>
                        </tr>`;
                    }).join('') || '<tr><td colspan="6">No invoices found.</td></tr>';
                };

                const bills = HMS.getData('bills');
                HMS.initPagination(bills, 'bills-tbody', 'pagination-info', 'prev-page', 'next-page', renderBillList);
                HMS.populateBillPatientSelects();

                // Default to today's date
                document.getElementById('bill-date').valueAsDate = new Date();

                // Event delegation for edit/delete
                document.getElementById('bills-tbody').addEventListener('click', (e) => {
                    const btn = e.target.closest('.action-btn');
                    if (!btn) return;
                    const id = Number(btn.dataset.id);
                    const action = btn.dataset.action;
                    if (action === 'edit') HMS.editBill(id);
                    if (action === 'delete') HMS.deleteBill(id);
                });

                document.getElementById('bill-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const rawId = document.getElementById('bill-id').value;
                    const id = rawId ? Number(rawId) : null;
                    const data = {
                        patientName: document.getElementById('bill-patient').value,
                        date: document.getElementById('bill-date').value,
                        amount: parseFloat(document.getElementById('bill-amount').value),
                        status: document.getElementById('bill-status').value
                    };
                    HMS.saveBill(id, data);
                    setTimeout(() => location.reload(), 800);
                });
            }
        });
    </script>
</body>
</html>
